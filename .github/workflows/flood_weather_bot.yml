name: Flood Weather DingTalk Bot

on:
  schedule:
    # 北京时间 07:30
    - cron: "30 23 * * *"

    # 北京时间 16:30
    - cron: "30 8 * * *"

  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flood weather bot
        env:
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
          QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}
        run: |
          python flood_weather_bot.py
