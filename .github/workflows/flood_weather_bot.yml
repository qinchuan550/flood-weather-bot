name: Flood Weather DingTalk Bot

on:
  schedule:
    # 北京时间 07:30
    - cron: "30 23 * * *"

    # 北京时间 16:30
    - cron: "30 8 * * *"

  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flood weather bot
        env:
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
          QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}
          CHART_OUTPUT: weather_7d_chart.png
          CHART_IMAGE_URL: ${{ secrets.CHART_IMAGE_URL }}
        run: |
          python flood_weather_bot.py

      - name: Upload seven-day chart
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-7d-chart
          path: weather_7d_chart.png
          if-no-files-found: ignore
