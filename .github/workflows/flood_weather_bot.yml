name: Flood Weather DingTalk Bot

on:
  schedule:
    # 北京时间 07:30
    - cron: "30 23 * * *"

    # 北京时间 16:30
    - cron: "30 8 * * *"

  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate report and chart
        env:
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
          QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}
          CHART_OUTPUT: public/weather_7d_chart.png
          CHART_IMAGE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/public/weather_7d_chart.png
          REPORT_OUTPUT: report.md
          SEND_DINGTALK: "false"
        run: |
          python flood_weather_bot.py

      - name: Publish chart to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/weather_7d_chart.png
          if git diff --cached --quiet; then
            echo "No chart changes to commit."
          else
            git commit -m "Update weather chart"
            git push
          fi

      - name: Send DingTalk report
        env:
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import flood_weather_bot as bot

          markdown_text = Path("report.md").read_text(encoding="utf-8")
          bot.send_dingtalk_markdown(bot.REPORT_TITLE, markdown_text)
          PY

      - name: Upload seven-day chart
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-7d-chart
          path: public/weather_7d_chart.png
          if-no-files-found: ignore
